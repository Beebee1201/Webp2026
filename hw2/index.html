<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        table {
            font-family: Arial, Helvetica, sans-serif;
            border-collapse: collapse;
            width: 100%;
        }

        td,
        th {
            border: 1px solid #ddd;
            padding: 6px;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tr:hover {
            background-color: #ddd;
        }

        th {
            padding-top: 12px;
            padding-bottom: 12px;
            text-align: left;
            background-color: #04AA6D;
            color: white;
        }

        /* ⭐ 自訂 Modal 尺寸，接近全螢幕 */
        .modal-dialog {
            max-width: 95vw;
            /* 寬度 95% 視窗 */
            height: 95vh;
            /* 高度 95% 視窗 */
            margin: auto;
        }

        .modal-body {

            height: calc(95vh - 100px);
            /* 減掉可能的 padding */
            padding: 5px !important;
        }

        .modal-body iframe {
            width: 100%;
            height: 100%;
            border: none;

        }
    </style>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
