<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adding and Deleting Elements</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
    crossorigin="anonymous"
  />
</head>
<body class="p-4">

  <div class="container">
    <h2 class="mb-4">Adding and Deleting Elements</h2>

    <p>Click the button to make a BUTTON element with text.</p>

    <button onclick="addfunction()" class="btn btn-outline-primary me-2">
      Add it
    </button>

    <button onclick="delfunction()" class="btn btn-outline-primary me-2">
      Del it
    </button>

    <div id="btn-area" class="mt-3 d-flex flex-wrap gap-2"></div>
  </div>

  <script>
    var count = 1;

    function addfunction() {
      var btn = document.createElement("button");
      btn.innerHTML = "CLICK ME (" + count + ")";
      btn.setAttribute("id", "btn_" + count);
      btn.setAttribute("class", "btn btn-outline-danger");

      document.getElementById("btn-area").appendChild(btn);
      count++;
    }

    function delfunction() {
      if (count > 1) {
        count--;
        var btn = document.getElementById("btn_" + count);
        document.getElementById("btn-area").removeChild(btn);
      }
    }
  </script>

</body>
</html>
